name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mosura
          POSTGRES_PASSWORD: mosura
          POSTGRES_DB: mosura
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # 注: 配布サーバは latest のみホストするためバージョン固定はできない。
      # 破壊的変更で CI が壊れた場合は moon version の出力と
      # docs/implementation-plan.md の開発時バージョン (0.1.20260713) を比較すること
      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Toolchain version
        run: moon version --all

      - name: Fetch registry index and dependencies
        run: |
          moon update
          moon install

      - name: Check (native)
        run: moon check --target native --deny-warn

      - name: Purity check — core packages must build on js/wasm-gc
        run: |
          CORE="src/graphql src/metadata src/schema src/schemagen src/session src/ir src/ndc_postgres/sqlgen src/ndc_postgres/exec src/engine src/workers"
          moon check --target js $CORE --deny-warn
          moon check --target wasm-gc $CORE --deny-warn

      - name: Test (native, incl. E2E vs PG16 service)
        env:
          MOSURA_TEST_PG_HOST: localhost
          MOSURA_TEST_PG_PORT: "5433"
          MOSURA_TEST_PG_USER: mosura
          MOSURA_TEST_PG_PASSWORD: mosura
          MOSURA_TEST_PG_DB: mosura
        run: moon test --target native

      - name: Format check
        run: |
          moon fmt
          git diff --exit-code

      - name: cases.toml freshness + tally
        run: |
          python3 scripts/gen_cases.py
          git diff --exit-code fixtures/cases.toml
